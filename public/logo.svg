<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Marbella Host My Home">
  <defs>
    <linearGradient id="mhmRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6202b"/>
      <stop offset="0.55" stop-color="#b3162a"/>
      <stop offset="1" stop-color="#8e1320"/>
    </linearGradient>
    <filter id="mhmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#6e0f1a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rombo (cuadrado redondeado rotado 45) -->
  <g transform="rotate(45 300 300)">
    <rect x="112" y="112" width="376" height="376" rx="44" fill="url(#mhmRed)" filter="url(#mhmShadow)"/>
    <rect x="140" y="140" width="320" height="320" rx="34" fill="none" stroke="#f7efe6" stroke-width="6" opacity="0.95"/>
  </g>

  <!-- Casa con pin de ubicación -->
  <g transform="translate(300 196)" fill="none" stroke="#f7efe6" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- tejado -->
    <path d="M-66 6 L0 -48 L66 6"/>
    <!-- cuerpo de la casa -->
    <path d="M-54 6 L-54 60 L54 60 L54 6"/>
  </g>
  <!-- pin -->
  <g transform="translate(300 196)" fill="#f7efe6">
    <path d="M0 8 C-16 8 -27 20 -27 35 C-27 53 0 74 0 74 C0 74 27 53 27 35 C27 20 16 8 0 8 Z"/>
    <circle cx="0" cy="33" r="9" fill="#b3162a"/>
  </g>

  <!-- Texto -->
  <g fill="#f7efe6" text-anchor="middle" font-family="'Arial Narrow', Arial, sans-serif">
    <text x="300" y="330" font-size="46" letter-spacing="8" font-weight="700">MARBELLA</text>
    <text x="300" y="392" font-size="72" letter-spacing="6" font-weight="800">HOST</text>
    <text x="300" y="456" font-size="72" letter-spacing="6" font-weight="800">MY</text>
    <text x="300" y="512" font-size="50" letter-spacing="12" font-weight="700">HOME</text>
  </g>
  <line x1="246" y1="528" x2="354" y2="528" stroke="#f7efe6" stroke-width="4"/>
</svg>
